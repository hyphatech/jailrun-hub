- name: Prometheus
  hosts: localhost
  gather_facts: false

  vars:
    PROMETHEUS_LISTEN_ADDRESS: "0.0.0.0:9090"
    PROMETHEUS_DATA_DIR: "/var/db/prometheus"
    PROMETHEUS_CONF_DIR: "/usr/local/etc"
    PROMETHEUS_CONF_FILE: "prometheus.yml"
    PROMETHEUS_CONF_PATH: "{{ PROMETHEUS_CONF_DIR }}/{{ PROMETHEUS_CONF_FILE }}"
    PROMETHEUS_RETENTION: "15d"

  tasks:
    - name: Install prometheus
      ansible.builtin.command: pkg install -y prometheus

    - name: Enable prometheus
      ansible.builtin.command: sysrc prometheus_enable=YES

    - name: Ensure data directory exists
      ansible.builtin.file:
        path: "{{ PROMETHEUS_DATA_DIR }}"
        state: directory
        owner: prometheus
        group: prometheus
        mode: "0750"

    - name: Install prometheus.yml from template
      ansible.builtin.template:
        src: prometheus.yml.j2
        dest: "{{ PROMETHEUS_CONF_PATH }}"
        mode: "0644"
      notify: restart prometheus

    - name: Set listen address and retention
      ansible.builtin.command: sysrc prometheus_args="--web.listen-address={{ PROMETHEUS_LISTEN_ADDRESS }} --storage.tsdb.retention.time={{ PROMETHEUS_RETENTION }}"

    - name: Set data dir
      ansible.builtin.command: sysrc prometheus_data_dir={{ PROMETHEUS_DATA_DIR }}

    - name: Set config file
      ansible.builtin.command: sysrc prometheus_config={{ PROMETHEUS_CONF_PATH }}

    - name: Start prometheus
      ansible.builtin.command: service prometheus start
      register: prometheus_start
      failed_when: >
        prometheus_start.rc != 0 and
        'already running' not in (prometheus_start.stderr | default('')) and
        'already running' not in (prometheus_start.stdout | default(''))

  handlers:
    - name: restart prometheus
      ansible.builtin.command: service prometheus restart
