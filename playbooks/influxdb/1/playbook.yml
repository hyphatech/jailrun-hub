- name: InfluxDB
  hosts: localhost
  gather_facts: false

  vars:
    INFLUXD_HTTP_BIND_ADDRESS: "0.0.0.0:8086"
    INFLUXD_REPORTING: false

  tasks:
    - name: Install InfluxDB
      ansible.builtin.command: pkg install -y influxdb

    - name: Enable InfluxDB
      ansible.builtin.command: sysrc influxd_enable=YES

    - name: Ensure influxd.conf exists
      ansible.builtin.copy:
        src: /usr/local/etc/influxd.conf.sample
        dest: /usr/local/etc/influxd.conf
        remote_src: true
        force: false

    - name: Set reporting
      ansible.builtin.lineinfile:
        path: /usr/local/etc/influxd.conf
        regexp: '^reporting-disabled'
        line: "reporting-disabled = {{ (not INFLUXD_REPORTING) | lower }}"
      notify: restart influxdb

    - name: Set HTTP bind address
      ansible.builtin.lineinfile:
        path: /usr/local/etc/influxd.conf
        regexp: '^\s*bind-address\s*='
        line: 'bind-address = "{{ INFLUXD_HTTP_BIND_ADDRESS }}"'
        insertafter: '^\[http\]'
      notify: restart influxdb

    - name: Start InfluxDB
      ansible.builtin.command: service influxd start
      register: influxd_start
      failed_when: >
        influxd_start.rc != 0 and
        'already running' not in (influxd_start.stderr | default('')) and
        'already running' not in (influxd_start.stdout | default(''))

  handlers:
    - name: restart influxdb
      ansible.builtin.command: service influxd restart
