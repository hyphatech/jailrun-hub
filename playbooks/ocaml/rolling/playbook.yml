- name: OCaml
  hosts: localhost
  gather_facts: false

  vars:
    PACKAGES: []

  tasks:
    - name: Install base packages
      ansible.builtin.package:
        name:
          - ocaml
          - ocaml-dune
          - ocaml-opam
        state: present

    - name: Install extra packages
      ansible.builtin.package:
        name: "{{ PACKAGES }}"
        state: present
      when: PACKAGES | length > 0

    - name: Initialize opam
      ansible.builtin.command: opam init --disable-sandboxing --shell-setup --yes
      args:
        creates: /root/.opam
      environment:
        HOME: /root

    - name: Install utop via opam
      ansible.builtin.command: opam install utop --yes
      environment:
        HOME: /root
        OPAMROOT: /root/.opam
        OPAMSWITCH: default
