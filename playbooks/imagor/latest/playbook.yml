- name: Imagor
  hosts: localhost
  gather_facts: false

  vars:
    IMAGOR_VERSION: "1.6.17"
    IMAGOR_USER: "imagor"
    IMAGOR_GROUP: "imagor"

  tasks:
    - name: Install packages
      ansible.builtin.command: >
        pkg install -y
        ca_root_nss
        git
        go
        pkgconf
        vips
      register: pkg_install
      failed_when: pkg_install.rc != 0

    - name: Ensure imagor group exists
      ansible.builtin.command: pw groupadd -n {{ IMAGOR_GROUP }}
      register: groupadd
      failed_when: groupadd.rc != 0 and 'already exists' not in (groupadd.stderr | default('') | lower)

    - name: Ensure imagor user exists
      ansible.builtin.command: >
        pw useradd -n {{ IMAGOR_USER }}
        -g {{ IMAGOR_GROUP }}
        -d /nonexistent
        -s /usr/sbin/nologin
      register: useradd
      failed_when: useradd.rc != 0 and 'already exists' not in (useradd.stderr | default('') | lower)

    - name: Create storage directory
      ansible.builtin.command: >
        install -d -o {{ IMAGOR_USER }} -g {{ IMAGOR_GROUP }} -m 0750 /var/lib/imagor
      args:
        creates: /var/lib/imagor

    - name: Check if imagor is installed
      ansible.builtin.command: test -x /usr/local/bin/imagor
      register: imagor_check
      changed_when: false
      failed_when: false

    - name: Build and install imagor
      ansible.builtin.command: >
        env GOPATH=/root/go GOBIN=/usr/local/bin CGO_ENABLED=1
        go install github.com/cshum/imagor/cmd/imagor@v{{ IMAGOR_VERSION }}
      when: imagor_check.rc != 0
