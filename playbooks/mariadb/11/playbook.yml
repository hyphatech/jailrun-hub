- name: MariaDB
  hosts: localhost
  gather_facts: false

  vars:
    MARIADB_PKG: "mariadb118-server"
    MARIADB_BIND_ADDRESS: "0.0.0.0"
    MARIADB_DB: "testdb"
    MARIADB_TEST_USER: "test"
    MARIADB_TEST_PASSWORD: "test"

  tasks:
    - name: Install MariaDB
      ansible.builtin.command: pkg install -y {{ MARIADB_PKG }}

    - name: Enable MariaDB
      ansible.builtin.command: sysrc mysql_enable=YES

    - name: Configure MariaDB
      ansible.builtin.copy:
        dest: /usr/local/etc/mysql/my.cnf
        content: |
          [mysqld]
          bind-address = {{ MARIADB_BIND_ADDRESS }}

    - name: Initialize MariaDB (first run)
      ansible.builtin.command: service mysql-server onestart
      args:
        creates: /var/db/mysql/mysql

    - name: Check if MariaDB is running
      ansible.builtin.command: service mysql-server status
      register: mariadb_status
      failed_when: false
      changed_when: false

    - name: Start MariaDB
      ansible.builtin.command: service mysql-server start
      when: mariadb_status.rc != 0

    - name: Restart MariaDB to apply config
      ansible.builtin.command: service mysql-server restart
      when: mariadb_status.rc == 0

    - name: Create test user
      ansible.builtin.command: >
        mysql -u root -e
        "CREATE USER IF NOT EXISTS '{{ MARIADB_TEST_USER }}'@'%' IDENTIFIED BY '{{ MARIADB_TEST_PASSWORD }}';"

    - name: Grant privileges to test user
      ansible.builtin.command: >
        mysql -u root -e
        "GRANT ALL PRIVILEGES ON *.* TO '{{ MARIADB_TEST_USER }}'@'%' WITH GRANT OPTION; FLUSH PRIVILEGES;"

    - name: Create database
      ansible.builtin.command: mysql -u root -e "CREATE DATABASE IF NOT EXISTS {{ MARIADB_DB }}"
      when: MARIADB_DB | length > 0
