- name: PostgreSQL
  hosts: localhost
  gather_facts: false

  vars:
    PACKAGES: []
    POSTGRES_LISTEN_ADDRESSES: "*"
    POSTGRES_HBA_RULE: "host all all all trust"
    POSTGRES_DB: "testdb"
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""

  tasks:
    - name: Install base packages
      ansible.builtin.package:
        name:
          - postgresql16-server
        state: present

    - name: Install extra packages
      ansible.builtin.package:
        name: "{{ PACKAGES }}"
        state: present
      when: PACKAGES | length > 0

    - name: Enable PostgreSQL
      ansible.builtin.command: sysrc postgresql_enable=YES

    - name: Initialize PostgreSQL
      ansible.builtin.command: /usr/local/etc/rc.d/postgresql initdb
      args:
        creates: /var/db/postgres/data16/PG_VERSION

    - name: Listen on all interfaces
      ansible.builtin.lineinfile:
        path: /var/db/postgres/data16/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '{{ POSTGRES_LISTEN_ADDRESSES }}'"

    - name: Allow connections
      ansible.builtin.lineinfile:
        path: /var/db/postgres/data16/pg_hba.conf
        line: "{{ POSTGRES_HBA_RULE }}"

    - name: Check if PostgreSQL is running
      ansible.builtin.command: service postgresql status
      register: pg_status
      failed_when: false
      changed_when: false

    - name: Start PostgreSQL
      ansible.builtin.command: service postgresql start
      when: pg_status.rc != 0

    - name: Reload PostgreSQL config
      ansible.builtin.command: service postgresql reload
      when: pg_status.rc == 0

    - name: Create database
      ansible.builtin.command: su -m postgres -c 'psql -c "CREATE DATABASE {{ POSTGRES_DB }}"'
      register: createdb
      failed_when: >
        createdb.rc != 0 and
        'already exists' not in (createdb.stderr | default(''))
      when: POSTGRES_DB | length > 0

    - name: Create user with password
      ansible.builtin.command: >
        su -m postgres -c "psql -c \"CREATE ROLE {{ POSTGRES_USER }}
        WITH LOGIN PASSWORD '{{ POSTGRES_PASSWORD }}'\""
      register: createuser
      failed_when: >
        createuser.rc != 0 and
        'already exists' not in (createuser.stderr | default(''))
      when: POSTGRES_USER | length > 0

    - name: Grant privileges on database
      ansible.builtin.command: >
        su -m postgres -c "psql -c \"GRANT ALL PRIVILEGES
        ON DATABASE {{ POSTGRES_DB }} TO {{ POSTGRES_USER }}\""
      when:
        - POSTGRES_USER | length > 0
        - POSTGRES_DB | length > 0
