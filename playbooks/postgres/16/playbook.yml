- name: PostgreSQL 16
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Install PostgreSQL
      ansible.builtin.command: pkg install -y postgresql16-server

    - name: Enable PostgreSQL
      ansible.builtin.command: sysrc postgresql_enable=YES

    - name: Initialize PostgreSQL
      ansible.builtin.command: /usr/local/etc/rc.d/postgresql initdb
      args:
        creates: /var/db/postgres/data16/PG_VERSION

    - name: Listen on all interfaces
      ansible.builtin.lineinfile:
        path: /var/db/postgres/data16/postgresql.conf
        regexp: "^#?listen_addresses"
        line: "listen_addresses = '*'"

    - name: Allow all connections
      ansible.builtin.lineinfile:
        path: /var/db/postgres/data16/pg_hba.conf
        line: "host all all all trust"

    - name: Check if PostgreSQL is running
      ansible.builtin.command: service postgresql status
      register: pg_status
      failed_when: false
      changed_when: false

    - name: Start PostgreSQL
      ansible.builtin.command: service postgresql start
      when: pg_status.rc != 0

    - name: Reload PostgreSQL config
      ansible.builtin.command: service postgresql reload
      when: pg_status.rc == 0

    - name: Create test database
      ansible.builtin.command: su -m postgres -c 'psql -c "CREATE DATABASE testdb"'
      register: createdb
      failed_when: >
        createdb.rc != 0 and
        'already exists' not in (createdb.stderr | default(''))
