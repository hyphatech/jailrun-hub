[project]
site_name = "Jailrun Hub"
site_description = "A curated collection of playbooks for Jailrun"
site_author = "Hypha"
site_url = "https://hub.jail.run/"
copyright = "© 2026 Hypha Technologies Ltd. All rights reserved."

nav = [
  { "Home" = "index.md" },
  { "Quick Start" = "get-started/quickstart.md" },
  { "Playbooks" = [
    { "Overview" = "playbooks/index.md" },
    { "Databases" = "databases/index.md" },
    { "Media" = "media/index.md" },
    { "Monitoring" = "monitoring/index.md" },
    { "Development" = "development/index.md" },
    { "P2P" = "p2p/index.md" },
    { "Web" = "web/index.md" },
    { "Security" = "security/index.md" },
    { "Desktop" = "desktop/index.md" },
  ]},
]

repo_url = "https://github.com/hyphatech/jailrun-hub"

[project.theme]
language = "en"
features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"
primary = "deep-orange"
accent = "orange"
